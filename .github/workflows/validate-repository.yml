name: Validate Repository

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Validate repository entries
        run: python scripts/validate_repo_entries.py

      - name: Regenerate indexes
        run: python scripts/generate_indexes.py

      - name: Ensure indexes are up to date
        run: git diff --exit-code indexes
